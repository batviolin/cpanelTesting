<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoFridge Smart Control Panel</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: #fff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 60px;
}

.panel {
  background: rgba(255,255,255,0.12);
  border-radius: 25px;
  box-shadow: 0 0 35px rgba(0,0,0,0.35);
  backdrop-filter: blur(20px);
  width: 90%;
  max-width: 900px;
  padding: 50px 40px 40px 40px;
  margin-bottom: 60px;
}

h1 { text-align: center; }

.subtitle {
  text-align: center;
  margin-bottom: 40px;
}

.temp-control, .inventory {
  background: rgba(255,255,255,0.15);
  border-radius: 15px;
  padding: 25px;
  margin-bottom: 30px;
}

.temp-buttons button {
  background: #00c6ff;
  border: none;
  color: #fff;
  padding: 12px 20px;
  font-size: 1.2em;
  border-radius: 8px;
  margin: 0 5px;
  cursor: pointer;
}

.inventory input {
  padding: 12px;
  border-radius: 8px;
  width: 65%;
}

.inventory button {
  background: #00c6ff;
  border: none;
  color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: rgba(255,255,255,0.2);
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.qty-controls button {
  margin: 0 3px;
  padding: 5px 8px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

/* Popup */
.popup {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #ff4d4d;
  padding: 20px;
  border-radius: 10px;
  display: none;
  color: #fff;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

.popup a {
  color: yellow;
  display: block;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="panel">
  <h1>NeoFridge Control Panel</h1>
  <p class="subtitle">Manage your fridge smartly</p>

  <div class="temp-control">
    <h2>Temperature</h2>
    <button id="decreaseTemp">−</button>
    <span id="temperature">4°C</span>
    <button id="increaseTemp">+</button>
  </div>

  <div class="inventory">
    <h2>Inventory</h2>
    <input type="text" id="itemInput" placeholder="Add item">
    <button id="addItem">Add</button>
    <ul id="itemList"></ul>
  </div>
</div>

<div id="popup" class="popup"></div>

<script>
let temperature = 4;
let recognition;
let listening = true;

const tempDisplay = document.getElementById('temperature');
const itemInput = document.getElementById('itemInput');
const itemList = document.getElementById('itemList');
const popup = document.getElementById('popup');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function updateTemp() {
  tempDisplay.textContent = temperature + "°C";
}

function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(speech);
}

// Popup function
function showPopup(item) {
  popup.innerHTML = `
    You are running low on ${item}
    <a href="https://batviolin.github.io/neofridge/?item=${item}" target="_blank">Order it here</a>
  `;
  popup.style.display = "block";

  setTimeout(() => {
    popup.style.display = "none";
  }, 5000);
}

// Check quantity
function checkQuantity(item, qty) {
  if (qty < 2) {
    speak("You are running low on " + item);
    showPopup(item);
  }
}

// Add item
document.getElementById('addItem').onclick = () => {
  let item = itemInput.value.trim();
  if (!item) return;

  let quantity = 3;

  let li = document.createElement("li");

  const nameSpan = document.createElement("span");
  nameSpan.textContent = `${item} (x${quantity})`;

  const controls = document.createElement("div");
  controls.className = "qty-controls";

  const minus = document.createElement("button");
  minus.textContent = "-";

  const plus = document.createElement("button");
  plus.textContent = "+";

  const remove = document.createElement("button");
  remove.textContent = "X";

  minus.onclick = () => {
    if (quantity > 0) {
      quantity--;
      nameSpan.textContent = `${item} (x${quantity})`;
      checkQuantity(item, quantity);
    }
  };

  plus.onclick = () => {
    quantity++;
    nameSpan.textContent = `${item} (x${quantity})`;
  };

  remove.onclick = () => li.remove();

  controls.append(minus, plus, remove);
  li.append(nameSpan, controls);
  itemList.appendChild(li);

  itemInput.value = "";
};

// Temp controls
document.getElementById('increaseTemp').onclick = () => {
  if (temperature < 10) {
    temperature++;
    updateTemp();
    speak("Temperature increased");
  }
};

document.getElementById('decreaseTemp').onclick = () => {
  if (temperature > -5) {
    temperature--;
    updateTemp();
    speak("Temperature decreased");
  }
};

// Voice recognition
if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.continuous = true;

  recognition.onresult = (e) => {
    let cmd = e.results[e.results.length - 1][0].transcript.toLowerCase();

    if (cmd.includes("increase")) {
      document.getElementById('increaseTemp').click();
    }
    else if (cmd.includes("decrease")) {
      document.getElementById('decreaseTemp').click();
    }
    else if (cmd.includes("add")) {
      let item = cmd.replace("add", "").trim();
      itemInput.value = item;
      document.getElementById('addItem').click();
    }
    else if (cmd.includes("stop listening")) {
      recognition.stop();
      listening = false;
      speak("Voice control stopped");
    }
  };

  // Auto start listening
  recognition.start();
}
</script>

</body>
</html>
