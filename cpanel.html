```html id="full-neofridge-code"
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoFridge Control Panel</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: white;
  display: flex;
  justify-content: center;
  padding-top: 40px;
}

.panel {
  background: rgba(255,255,255,0.15);
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 800px;
}

button {
  padding: 8px 12px;
  margin: 5px;
  cursor: pointer;
  border: none;
  border-radius: 6px;
}

li {
  display: flex;
  justify-content: space-between;
  background: rgba(255,255,255,0.2);
  margin: 5px 0;
  padding: 8px;
  border-radius: 6px;
  align-items: center;
}

.qty-controls button {
  margin-left: 5px;
}

.popup {
  position: fixed;
  top: 20px;
  right: 20px;
  background: red;
  padding: 15px;
  border-radius: 10px;
  display: none;
}

.popup a {
  color: yellow;
  display: block;
}
</style>
</head>

<body>

<div class="panel">
  <h1>NeoFridge</h1>

  <h2>Temperature</h2>
  <button id="decreaseTemp">−</button>
  <span id="temperature">4°C</span>
  <button id="increaseTemp">+</button>

  <h2>Inventory</h2>
  <input id="itemInput" placeholder="Add item">
  <button id="addItem">Add</button>
  <ul id="itemList"></ul>

  <br>
  <button id="startVoice">🎤 Start Voice System</button>
  <button id="stopVoice">⛔ Stop System</button>
  <button id="statusBtn">🔊 Status</button>
</div>

<div id="popup" class="popup"></div>

<script>
let temperature = 4;
let recognition;
let listening = false;
let initialized = false;

const tempDisplay = document.getElementById('temperature');
const itemInput = document.getElementById('itemInput');
const itemList = document.getElementById('itemList');
const popup = document.getElementById('popup');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function updateTemp() {
  tempDisplay.textContent = temperature + "°C";
}

function speak(text) {
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

// Popup
function showPopup(item) {
  popup.innerHTML = `
    ⚠ Running low on ${item}
    <a href="https://batviolin.github.io/neofridge/?item=${item}" target="_blank">Order it here</a>
  `;
  popup.style.display = "block";
  setTimeout(() => popup.style.display = "none", 5000);
}

// Quantity check
function checkQuantity(item, qty) {
  if (qty < 2) {
    speak("You are running low on " + item);
    showPopup(item);
  }
}

// Find item
function findItem(item) {
  return [...itemList.children].find(li =>
    li.firstChild.textContent.toLowerCase().includes(item)
  );
}

// Add item
document.getElementById('addItem').onclick = () => {
  let item = itemInput.value.trim();
  if (!item) return;

  let qty = 3;

  let li = document.createElement("li");
  let name = document.createElement("span");
  name.textContent = `${item} (x${qty})`;

  let controls = document.createElement("div");
  controls.className = "qty-controls";

  let minus = document.createElement("button");
  minus.textContent = "-";

  let plus = document.createElement("button");
  plus.textContent = "+";

  let remove = document.createElement("button");
  remove.textContent = "X";

  minus.onclick = () => {
    if (qty > 0) {
      qty--;
      name.textContent = `${item} (x${qty})`;
      checkQuantity(item, qty);
    }
  };

  plus.onclick = () => {
    qty++;
    name.textContent = `${item} (x${qty})`;
  };

  remove.onclick = () => li.remove();

  controls.append(minus, plus, remove);
  li.append(name, controls);
  itemList.appendChild(li);

  itemInput.value = "";
};

// Temperature controls
increaseTemp.onclick = () => {
  temperature++;
  updateTemp();
};

decreaseTemp.onclick = () => {
  temperature--;
  updateTemp();
};

// Status
statusBtn.onclick = () => {
  let items = [...itemList.children].map(li => li.firstChild.textContent);
  speak("Temperature is " + temperature + ". Items: " + (items.join(", ") || "none"));
};

// Voice system
if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.continuous = true;

  recognition.onresult = (e) => {
    let cmd = e.results[e.results.length - 1][0].transcript.toLowerCase().trim();
    console.log("Heard:", cmd);

    // Wake command
    if (cmd.includes("start listening")) {
      listening = true;
      speak("Listening activated");
      return;
    }

    // Ignore if not active
    if (!listening) return;

    // Temperature
    if (cmd === "increase") increaseTemp.click();
    else if (cmd === "decrease") decreaseTemp.click();

    // Add
    else if (cmd.startsWith("add ")) {
      itemInput.value = cmd.replace("add ", "");
      addItem.click();
    }

    // Increase item
    else if (cmd.startsWith("increase ")) {
      let li = findItem(cmd.replace("increase ", ""));
      if (li) li.querySelectorAll("button")[1].click();
    }

    // Decrease item
    else if (cmd.startsWith("decrease ")) {
      let li = findItem(cmd.replace("decrease ", ""));
      if (li) li.querySelectorAll("button")[0].click();
    }

    // Remove item
    else if (cmd.startsWith("remove ")) {
      let li = findItem(cmd.replace("remove ", ""));
      if (li) li.remove();
    }

    // Status
    else if (cmd.includes("status")) {
      statusBtn.click();
    }

    // Stop listening
    else if (cmd.includes("stop listening")) {
      listening = false;
      speak("Listening stopped");
    }
  };

  // Prevent stopping
  recognition.onend = () => {
    if (initialized) {
      setTimeout(() => recognition.start(), 500);
    }
  };
}

// Start system (required once)
startVoice.onclick = () => {
  if (!initialized) {
    recognition.start();
    initialized = true;
    speak("Voice system ready. Say start listening");
  }
};

// Stop system completely
stopVoice.onclick = () => {
  if (recognition) recognition.stop();
  initialized = false;
  listening = false;
  speak("Voice system off");
};
</script>

</body>
</html>
