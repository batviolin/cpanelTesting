<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoFridge | Accessible Smart Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --danger: #ff4b5c;
            --success: #00e676;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }
        body { 
            margin: 0; font-family: 'Outfit', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: #f8fafc; min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; padding: 20px; overflow: hidden;
        }
        .panel { 
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(16px); width: 100%; max-width: 600px; padding: 40px;
        }
        h1 { font-size: 2.2em; text-align: center; margin: 0; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #94a3b8; text-align: center; margin-bottom: 30px; font-size: 0.9em; text-transform: uppercase; }
        .temp-control { background: rgba(0, 0, 0, 0.2); border-radius: 24px; padding: 20px; margin-bottom: 25px; text-align: center; }
        .temp-display { font-size: 3.5em; font-weight: 600; display: block; margin: 10px 0; }
        .btn-round { background: var(--glass); border: 1px solid var(--glass-border); color: white; width: 50px; height: 50px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; }
        .inventory input { flex: 1; padding: 14px; border-radius: 14px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; }
        .btn-add { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; padding: 12px 20px; border-radius: 14px; font-weight: 600; cursor: pointer; }
        ul { list-style: none; padding: 0; max-height: 200px; overflow-y: auto; }
        li { background: var(--glass); padding: 12px 20px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        #toggleVoice { background: var(--success); color: #000; border: none; padding: 15px; border-radius: 16px; font-weight: 800; cursor: pointer; }
        #toggleVoice.listening { background: var(--danger); color: white; animation: pulse 1.5s infinite; }
        #popupOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); display: none; justify-content: center; align-items: center; z-index: 1000; text-align: center; padding: 20px;
        }
        .popup-content { background: var(--bg-dark); border: 2px solid var(--primary); padding: 40px; border-radius: 24px; max-width: 400px; }
    </style>
</head>
<body>

<div id="popupOverlay">
    <div class="popup-content">
        <h2 style="color:var(--danger)">Low Stock Alert</h2>
        <p id="popMsg"></p>
        <a id="popLink" href="#" target="_blank" style="color:var(--primary); word-break: break-all;">Order Link</a><br><br>
        <button class="btn-add" style="background:var(--glass); color:white" onclick="closePopup()">Dismiss</button>
    </div>
</div>

<div class="panel">
    <h1>NeoFridge</h1>
    <p class="subtitle">Smart Assistant</p>

    <div class="temp-control">
        <div style="display: flex; justify-content: center; align-items: center; gap: 30px;">
            <button class="btn-round" onclick="changeTemp(-1)">−</button>
            <span class="temp-display" id="temperature">4°C</span>
            <button class="btn-round" onclick="changeTemp(1)">+</button>
        </div>
    </div>

    <div class="inventory">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="itemInput" placeholder="Add item (e.g. Eggs)">
            <button class="btn-add" onclick="manualAdd()">Add</button>
        </div>
        <ul id="itemList"></ul>
    </div>

    <div class="controls">
        <button class="btn-add" style="background: var(--glass); color: white;" onclick="reportStatus()">🔊 Status</button>
        <button id="toggleVoice" onclick="toggleListening()">🎤 START LISTENING</button>
    </div>
</div>

<script>
    let temperature = 4;
    let inventory = [];
    let listening = false;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = SpeechRecognition ? new SpeechRecognition() : null;
    
    // --- SPEECH ENGINE FIX ---
    function speak(text) {
        // Force-cancel and resume to wake up the engine after long idle times
        window.speechSynthesis.cancel();
        
        if (window.speechSynthesis.paused) {
            window.speechSynthesis.resume();
        }

        // Delay speech slightly to let the 'cancel' clear the buffer
        setTimeout(() => {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9;
            utterance.lang = 'en-US';

            // Error handling to log if the engine fails
            utterance.onerror = (event) => console.error("Speech Error:", event);
            
            window.speechSynthesis.speak(utterance);
        }, 100);
    }

    function triggerPopup(itemName) {
        const url = `batviolin.github.io/neofridge/?item=${encodeURIComponent(itemName)}`;
        const msg = `Warning: You are running low on ${itemName}. Only one remaining.`;
        
        document.getElementById('popMsg').textContent = msg;
        document.getElementById('popLink').href = "https://" + url;
        document.getElementById('popLink').textContent = url;
        document.getElementById('popupOverlay').style.display = 'flex';
        
        return msg + " Order link is now on screen.";
    }

    function closePopup() {
        document.getElementById('popupOverlay').style.display = 'none';
        speak("Alert dismissed.");
    }

    function renderInventory() {
        const list = document.getElementById('itemList');
        list.innerHTML = "";
        inventory.forEach((item, index) => {
            const li = document.createElement("li");
            li.innerHTML = `<span>${item.name} (Qty: ${item.qty})</span>
                <button style="background:var(--danger); border:none; color:white; border-radius:8px; padding:5px 10px; cursor:pointer;" onclick="deleteItem(${index})">Remove</button>`;
            list.appendChild(li);
        });
    }

    function handleInventoryUpdate(name, delta, isNew = false) {
        name = name.toLowerCase().trim();
        if(!name) return;

        let item = inventory.find(i => i.name === name);
        let finalSpeech = "";

        if (isNew && !item) {
            item = { name: name, qty: 1 };
            inventory.push(item);
            finalSpeech = `Added ${name}. `;
        } else if (item) {
            item.qty += delta;
            finalSpeech = `${name} is now ${item.qty}. `;
        }

        if (item && item.qty === 1) {
            const alertSpeech = triggerPopup(name);
            finalSpeech += alertSpeech;
        }

        if (item && item.qty <= 0) {
            inventory = inventory.filter(i => i.name !== name);
            finalSpeech = `${name} removed.`;
        }

        speak(finalSpeech);
        renderInventory();
    }

    function manualAdd() {
        const input = document.getElementById('itemInput');
        handleInventoryUpdate(input.value, 1, true);
        input.value = "";
    }

    function deleteItem(index) {
        const name = inventory[index].name;
        inventory.splice(index, 1);
        speak(`Deleted ${name}.`);
        renderInventory();
    }

    function changeTemp(delta) {
        temperature += delta;
        document.getElementById('temperature').textContent = temperature + "°C";
        speak(`Temperature: ${temperature} degrees.`);
    }

    function reportStatus() {
        let str = inventory.map(i => `${i.qty} ${i.name}`).join(", ");
        speak(`Fridge is ${temperature} degrees. Items: ${str || "empty"}`);
    }

    if(recognition) {
        recognition.onresult = (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
            if (transcript.includes("increase temperature")) changeTemp(1);
            else if (transcript.includes("decrease temperature")) changeTemp(-1);
            else if (transcript.startsWith("add ")) handleInventoryUpdate(transcript.replace("add ", ""), 1, true);
            else if (transcript.startsWith("increase ")) handleInventoryUpdate(transcript.replace("increase ", ""), 1);
            else if (transcript.startsWith("decrease ")) handleInventoryUpdate(transcript.replace("decrease ", ""), -1);
            else if (transcript.includes("status")) reportStatus();
        };
        recognition.onend = () => { if (listening) recognition.start(); };
    }

    function toggleListening() {
        const btn = document.getElementById('toggleVoice');
        if (!listening) {
            listening = true;
            recognition.start();
            btn.textContent = "🛑 STOP LISTENING";
            speak("I am listening.");
        } else {
            listening = false;
            recognition.stop();
            btn.textContent = "🎤 START LISTENING";
            speak("Voice off.");
        }
    }
</script>
</body>
</html>
