<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoFridge Smart Control Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { margin: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #00c6ff, #0072ff); color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding-top: 60px; }
        .panel { background: rgba(255,255,255,0.12); border-radius: 25px; box-shadow: 0 0 35px rgba(0,0,0,0.35); backdrop-filter: blur(20px); width: 90%; max-width: 900px; padding: 50px 40px 40px 40px; margin-bottom: 60px; }
        h1 { font-size: 2.5em; text-align: center; margin-bottom: 10px; }
        .subtitle { color: #dff; text-align: center; margin-bottom: 40px; }
        .temp-control, .inventory { background: rgba(255,255,255,0.15); border-radius: 15px; padding: 25px; margin-bottom: 30px; }
        .temp-display { font-size: 3em; font-weight: 600; margin: 0 15px; }
        .temp-buttons button { background: #00c6ff; border: none; color: #fff; padding: 12px 20px; font-size: 1.2em; border-radius: 8px; margin: 0 5px; cursor: pointer; transition: 0.3s; }
        .temp-buttons button:hover { background: #0099cc; }
        .inventory input { padding: 12px; border: none; border-radius: 8px; width: 60%; margin-right: 10px; }
        .inventory button { background: #00c6ff; border: none; color: #fff; padding: 12px 20px; border-radius: 8px; cursor: pointer; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: rgba(255,255,255,0.2); padding: 12px 20px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .item-controls button { background: #00c6ff; border: none; color: white; padding: 5px 12px; border-radius: 5px; cursor: pointer; margin-left: 5px; }
        .remove-btn { background: #ff4d4d !important; }
        .controls { text-align: center; margin-top: 30px; }
        .controls button { margin: 5px; padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
        #toggleVoice { background: #4CAF50; color: white; }
        #toggleVoice.listening { background: #ff4d4d; }
    </style>
</head>
<body>

<div class="panel">
    <h1>NeoFridge Control Panel</h1>
    <p class="subtitle">Manage your fridge temperature and inventory effortlessly.</p>

    <div class="temp-control">
        <h2>Temperature</h2>
        <div class="temp-buttons">
            <button id="decreaseTemp">−</button>
            <span id="temperature">4°C</span>
            <button id="increaseTemp">+</button>
        </div>
    </div>

    <div class="inventory">
        <h2>Inventory</h2>
        <div style="display: flex;">
            <input type="text" id="itemInput" placeholder="Item name (e.g. Milk)">
            <button id="addItem">Add Item</button>
        </div>
        <ul id="itemList"></ul>
    </div>

    <div class="controls">
        <button id="speakAll">🔊 Status Report</button>
        <button id="toggleVoice">🎤 Start Listening</button>
    </div>
</div>

<script>
    let temperature = 4;
    let inventory = []; // Array of objects { name: string, qty: number }

    const tempDisplay = document.getElementById('temperature');
    const decreaseTempBtn = document.getElementById('decreaseTemp');
    const increaseTempBtn = document.getElementById('increaseTemp');
    const itemInput = document.getElementById('itemInput');
    const addItemBtn = document.getElementById('addItem');
    const itemList = document.getElementById('itemList');
    const speakBtn = document.getElementById('speakAll');
    const toggleVoiceBtn = document.getElementById('toggleVoice');

    let listening = false;
    let recognition;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    function updateTempDisplay() {
        tempDisplay.textContent = temperature + "°C";
    }

    function speak(text) {
        const speech = new SpeechSynthesisUtterance(text);
        window.speechSynthesis.speak(speech);
    }

    function triggerLowStockAlert(itemName) {
        const url = `batviolin.github.io/neofridge/?item=${encodeURIComponent(itemName)}`;
        alert(`You are running low on ${itemName}!\nRestock here: ${url}`);
    }

    function renderInventory() {
        itemList.innerHTML = "";
        inventory.forEach((item, index) => {
            const li = document.createElement("li");
            li.innerHTML = `
                <span><strong>${item.name}</strong> — Quantity: ${item.qty}</span>
                <div class="item-controls">
                    <button onclick="changeQty(${index}, 1)">+</button>
                    <button onclick="changeQty(${index}, -1)">-</button>
                    <button class="remove-btn" onclick="deleteItem(${index})">Remove</button>
                </div>
            `;
            itemList.appendChild(li);
        });
    }

    // --- Core Logic Functions ---

    function addItem(name) {
        let existing = inventory.find(i => i.name.toLowerCase() === name.toLowerCase());
        if (existing) {
            existing.qty++;
        } else {
            inventory.push({ name: name, qty: 1 });
            // Alert if initial add is 1
            triggerLowStockAlert(name);
        }
        renderInventory();
    }

    function changeQty(index, delta) {
        inventory[index].qty += delta;
        if (inventory[index].qty < 2 && inventory[index].qty > 0 && delta < 0) {
            triggerLowStockAlert(inventory[index].name);
        }
        if (inventory[index].qty <= 0) {
            deleteItem(index);
        } else {
            renderInventory();
        }
    }

    function deleteItem(index) {
        inventory.splice(index, 1);
        renderInventory();
    }

    // --- UI Event Listeners ---

    increaseTempBtn.onclick = () => {
        if (temperature < 10) {
            temperature++;
            updateTempDisplay();
            speak("Temperature increased");
        }
    };

    decreaseTempBtn.onclick = () => {
        if (temperature > -5) {
            temperature--;
            updateTempDisplay();
            speak("Temperature decreased");
        }
    };

    addItemBtn.onclick = () => {
        const name = itemInput.value.trim();
        if (name) {
            addItem(name);
            itemInput.value = "";
        }
    };

    speakBtn.onclick = () => {
        let itemsStr = inventory.map(i => `${i.qty} ${i.name}`).join(", ");
        speak(`Fridge temperature is ${temperature} degrees. Inventory contains: ${itemsStr || "nothing"}`);
    };

    // --- Voice Recognition Logic ---

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
            console.log("Recognized:", transcript);

            // Temperature Controls
            if (transcript.includes("increase temperature")) {
                increaseTempBtn.click();
            } else if (transcript.includes("decrease temperature")) {
                decreaseTempBtn.click();
            } 
            
            // Remove Command (Full Deletion)
            else if (transcript.startsWith("remove ")) {
                const name = transcript.replace("remove ", "").trim();
                const idx = inventory.findIndex(i => i.name.toLowerCase() === name);
                if (idx !== -1) deleteItem(idx);
            }

            // Increase Command (Quantity Change)
            else if (transcript.startsWith("increase ")) {
                const name = transcript.replace("increase ", "").trim();
                const idx = inventory.findIndex(i => i.name.toLowerCase() === name);
                if (idx !== -1) changeQty(idx, 1);
            }

            // Decrease Command (Quantity Change)
            else if (transcript.startsWith("decrease ")) {
                const name = transcript.replace("decrease ", "").trim();
                const idx = inventory.findIndex(i => i.name.toLowerCase() === name);
                if (idx !== -1) changeQty(idx, -1);
            }

            // Add Command (New Item or +1)
            else if (transcript.startsWith("add ")) {
                const name = transcript.replace("add ", "").trim();
                addItem(name);
            }

            // Status Command
            else if (transcript.includes("status")) {
                speakBtn.click();
            }
        };
    }

    toggleVoiceBtn.onclick = () => {
        if (!SpeechRecognition) return alert("Speech recognition not supported in this browser.");
        
        if (!listening) {
            recognition.start();
            listening = true;
            toggleVoiceBtn.textContent = "Stop Listening";
            toggleVoiceBtn.classList.add("listening");
        } else {
            recognition.stop();
            listening = false;
            toggleVoiceBtn.textContent = "Start Listening";
            toggleVoiceBtn.classList.remove("listening");
        }
    };
</script>

</body>
</html>
